<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT 新闻雷达 · GDELT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --surface: #090d18;
    --card: #0c1220;
    --border: #162032;
    --accent: #00ffe0;
    --accent2: #ff6b35;
    --accent3: #7b61ff;
    --text: #dce8f0;
    --muted: #4a6070;
    --success: #00e5a0;
    --warn: #ffb020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 10% 0%, rgba(0,255,224,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(123,97,255,0.05) 0%, transparent 60%),
      linear-gradient(rgba(0,255,224,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,224,0.015) 1px, transparent 1px);
    background-size: auto, auto, 50px 50px, 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    max-width: 1000px;
    margin: 0 auto;
    padding: 36px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .header { margin-bottom: 40px; }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 6px;
  }

  .logo-block {}

  .logo-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-eyebrow::before {
    content: '';
    display: inline-block;
    width: 20px; height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 7vw, 64px);
    letter-spacing: 3px;
    line-height: 1;
    color: #fff;
  }

  h1 span { color: var(--accent); }

  .source-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .gdelt-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .gdelt-tag {
    background: rgba(0,255,224,0.08);
    border: 1px solid rgba(0,255,224,0.2);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .free-badge {
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.25);
    color: var(--success);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  /* ── CONTROL PANEL ── */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 28px;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 24px; right: 24px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,255,224,0.4), transparent);
  }

  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .controls {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: end;
  }

  @media (max-width: 600px) {
    .controls { grid-template-columns: 1fr; }
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  input[type="date"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    color-scheme: dark;
    width: 100%;
  }

  input[type="date"]:focus { border-color: var(--accent); }

  .keyword-wrap {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .kw-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 5px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    letter-spacing: 0.5px;
  }

  .kw-chip input[type="checkbox"] { display: none; }

  .kw-chip.c1 { border-color: rgba(0,255,224,0.3); color: rgba(0,255,224,0.6); }
  .kw-chip.c1.on { background: rgba(0,255,224,0.12); color: var(--accent); border-color: var(--accent); }
  .kw-chip.c2 { border-color: rgba(255,107,53,0.3); color: rgba(255,107,53,0.6); }
  .kw-chip.c2.on { background: rgba(255,107,53,0.12); color: var(--accent2); border-color: var(--accent2); }
  .kw-chip.c3 { border-color: rgba(123,97,255,0.3); color: rgba(123,97,255,0.6); }
  .kw-chip.c3.on { background: rgba(123,97,255,0.12); color: var(--accent3); border-color: var(--accent3); }
  .kw-chip.c4 { border-color: rgba(255,176,32,0.3); color: rgba(255,176,32,0.6); }
  .kw-chip.c4.on { background: rgba(255,176,32,0.12); color: var(--warn); border-color: var(--warn); }

  .kw-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .btn-go {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 26px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-go:hover { box-shadow: 0 0 20px rgba(0,255,224,0.35); transform: translateY(-1px); }
  .btn-go:active { transform: none; }
  .btn-go:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── STATUS ── */
  .status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 10px;
    letter-spacing: 1px;
  }

  .status.loading {
    display: flex;
    background: rgba(0,255,224,0.05);
    border: 1px solid rgba(0,255,224,0.15);
    color: var(--accent);
  }

  .status.error {
    display: flex;
    background: rgba(255,80,80,0.05);
    border: 1px solid rgba(255,80,80,0.2);
    color: #ff5050;
  }

  .spin {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,255,224,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULTS ── */
  .results-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .results-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .results-stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--success);
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .news-list { display: flex; flex-direction: column; gap: 12px; }

  .news-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px 20px;
    align-items: start;
    transition: all 0.2s;
    animation: fadeUp 0.35s ease both;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }

  .news-item:hover {
    border-color: rgba(0,255,224,0.25);
    background: #0f1828;
    transform: translateX(3px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .news-item:nth-child(1) { animation-delay: 0.03s; }
  .news-item:nth-child(2) { animation-delay: 0.06s; }
  .news-item:nth-child(3) { animation-delay: 0.09s; }
  .news-item:nth-child(4) { animation-delay: 0.12s; }
  .news-item:nth-child(5) { animation-delay: 0.15s; }
  .news-item:nth-child(n+6) { animation-delay: 0.18s; }

  .news-main {}

  .news-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .news-domain {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    background: rgba(0,255,224,0.07);
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid rgba(0,255,224,0.15);
  }

  .news-lang {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .news-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 6px;
  }

  .news-seendates {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .news-arrow {
    color: var(--muted);
    font-size: 16px;
    align-self: center;
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }

  .news-item:hover .news-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  /* empty / placeholder */
  .placeholder {
    text-align: center;
    padding: 70px 20px;
  }

  .placeholder-icon {
    font-size: 42px;
    margin-bottom: 14px;
    opacity: 0.35;
  }

  .placeholder-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: #2a3a4a;
    margin-bottom: 8px;
  }

  .placeholder-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* pagination */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .page-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .page-btn:hover, .page-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,224,0.07);
  }

  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo-block">
        <div class="logo-eyebrow">Industry Intelligence · Real-time Feed</div>
        <h1>IOT <span>&</span> SMART HOME<br>新闻雷达</h1>
      </div>
      <div class="source-badge">
        <div class="gdelt-label">DATA SOURCE</div>
        <div class="gdelt-tag">GDELT DOC API</div>
        <div class="free-badge">✓ 完全免费 · 无需 Key</div>
      </div>
    </div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="panel">
    <div class="panel-title">// 检索参数配置</div>
    <div class="controls">
      <div class="ctrl-group">
        <div class="ctrl-label">目标日期</div>
        <input type="date" id="dateInput" />
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">关键词筛选</div>
        <div class="keyword-wrap" id="kwWrap">
          <label class="kw-chip c1 on"><input type="checkbox" value="IoT" checked><span class="kw-dot"></span>IoT</label>
          <label class="kw-chip c1 on"><input type="checkbox" value="Internet of Things" checked><span class="kw-dot"></span>物联网</label>
          <label class="kw-chip c2 on"><input type="checkbox" value="smart home" checked><span class="kw-dot"></span>Smart Home</label>
          <label class="kw-chip c2 on"><input type="checkbox" value="智能家居" checked><span class="kw-dot"></span>智能家居</label>
          <label class="kw-chip c3"><input type="checkbox" value="AIoT"><span class="kw-dot"></span>AIoT</label>
          <label class="kw-chip c3"><input type="checkbox" value="smart device"><span class="kw-dot"></span>Smart Device</label>
          <label class="kw-chip c4"><input type="checkbox" value="edge computing"><span class="kw-dot"></span>Edge Computing</label>
          <label class="kw-chip c4"><input type="checkbox" value="Matter protocol"><span class="kw-dot"></span>Matter</label>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">&nbsp;</div>
        <button class="btn-go" id="goBtn" onclick="search()">SCAN</button>
      </div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status" id="status">
    <div class="spin"></div>
    <span id="statusTxt">正在扫描 GDELT 全球新闻数据库...</span>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="placeholder">
      <div class="placeholder-icon">📡</div>
      <div class="placeholder-title">AWAITING SCAN</div>
      <div class="placeholder-sub">
        选择日期 · 勾选关键词 · 点击 SCAN<br>
        直接从 GDELT 全球新闻数据库拉取真实资讯<br>
        <span style="color:rgba(0,255,224,0.4)">无需 API Key · 完全免费</span>
      </div>
    </div>
  </div>

</div>

<script>
// ── chip toggle ──
document.querySelectorAll('.kw-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chip.classList.toggle('on');
    chip.querySelector('input').checked = chip.classList.contains('on');
  });
});

// default date = today
document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

let allArticles = [];
let currentPage = 1;
const PAGE_SIZE = 20;

function getKeywords() {
  return [...document.querySelectorAll('.kw-chip.on input')].map(i => i.value);
}

function buildQuery(keywords) {
  return keywords.map(k => `"${k}"`).join(' OR ');
}

function setStatus(type, txt) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusTxt').textContent = txt;
}

function hideStatus() {
  document.getElementById('status').className = 'status';
}

// Compute how many hours ago a date was (for GDELT timespan param)
function getTimespanHours(dateStr) {
  const target = new Date(dateStr);
  const now = new Date();
  const diffMs = now - target;
  const diffHours = Math.ceil(diffMs / (1000 * 60 * 60));
  return diffHours;
}

// Parse RSS XML into article objects
function parseRSS(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');
  const items = Array.from(xml.querySelectorAll('item'));
  return items.map(item => {
    const title = item.querySelector('title')?.textContent || '(无标题)';
    const link = item.querySelector('link')?.textContent?.trim() ||
                 item.querySelector('guid')?.textContent?.trim() || '#';
    const pubDate = item.querySelector('pubDate')?.textContent || '';
    const description = item.querySelector('description')?.textContent || '';
    // Extract domain from description or link
    let domain = '';
    try { domain = new URL(link).hostname.replace('www.', ''); } catch {}
    // Parse date
    let dateStr = '';
    if (pubDate) {
      try { dateStr = new Date(pubDate).toLocaleDateString('zh-CN'); } catch {}
    }
    return { title, url: link, domain, date: dateStr, description };
  });
}

// Filter articles to match target date
function filterByDate(articles, dateStr) {
  if (!dateStr) return articles;
  const target = new Date(dateStr);
  const targetDate = target.toDateString();
  // Allow ±1 day tolerance
  const prev = new Date(target); prev.setDate(prev.getDate() - 1);
  const next = new Date(target); next.setDate(next.getDate() + 1);
  return articles.filter(a => {
    if (!a.date) return true; // keep if no date info
    // Try to match by checking if the article date string contains the year and month
    const yr = target.getFullYear().toString();
    const mo = (target.getMonth() + 1).toString().padStart(2, '0');
    const dy = target.getDate().toString().padStart(2, '0');
    return a.date.includes(yr) && (a.date.includes(mo) || a.date.includes(target.getMonth() + 1));
  });
}

function renderPage(page) {
  currentPage = page;
  const start = (page - 1) * PAGE_SIZE;
  const slice = allArticles.slice(start, start + PAGE_SIZE);
  const total = allArticles.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);

  let html = `
    <div class="results-meta">
      <div class="results-label">// 检索结果</div>
      <div class="results-stat">共 ${total} 条 · 第 ${page}/${totalPages} 页</div>
    </div>
    <div class="news-list">`;

  for (const a of slice) {
    html += `
      <a class="news-item" href="${a.url}" target="_blank" rel="noopener">
        <div class="news-main">
          <div class="news-top">
            <span class="news-domain">${a.domain || '未知来源'}</span>
            ${a.date ? `<span class="news-lang">${a.date}</span>` : ''}
          </div>
          <div class="news-title">${a.title}</div>
          ${a.description ? `<div class="news-seendates" style="margin-top:4px;font-family:'Noto Sans SC';font-size:12px;color:#4a6070;line-height:1.5;">${a.description.substring(0,120)}${a.description.length > 120 ? '…' : ''}</div>` : ''}
        </div>
        <div class="news-arrow">→</div>
      </a>`;
  }

  html += '</div>';

  if (totalPages > 1) {
    html += '<div class="pagination">';
    if (page > 1) html += `<button class="page-btn" onclick="renderPage(${page-1})">← 上一页</button>`;
    for (let p = Math.max(1, page-2); p <= Math.min(totalPages, page+2); p++) {
      html += `<button class="page-btn ${p===page?'active':''}" onclick="renderPage(${p})">${p}</button>`;
    }
    if (page < totalPages) html += `<button class="page-btn" onclick="renderPage(${page+1})">下一页 →</button>`;
    html += '</div>';
  }

  document.getElementById('results').innerHTML = html;
}

async function fetchViaProxy(gdeltUrl) {
  // Try allorigins proxy to bypass CORS
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(gdeltUrl)}`;
  const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
  if (!resp.ok) throw new Error(`代理请求失败 HTTP ${resp.status}`);
  const data = await resp.json();
  if (!data.contents) throw new Error('代理返回内容为空');
  return data.contents;
}

async function search() {
  const dateVal = document.getElementById('dateInput').value;
  const keywords = getKeywords();

  if (!dateVal) { alert('请选择日期'); return; }
  if (keywords.length === 0) { alert('请至少勾选一个关键词'); return; }

  // Check date is within last 3 months (GDELT limit)
  const targetDate = new Date(dateVal);
  const now = new Date();
  const diffDays = (now - targetDate) / (1000 * 60 * 60 * 24);
  if (diffDays > 90) {
    document.getElementById('results').innerHTML = `
      <div class="placeholder">
        <div class="placeholder-icon">⚠️</div>
        <div class="placeholder-title">日期超出范围</div>
        <div class="placeholder-sub">GDELT DOC API 仅支持查询<br><span style="color:rgba(0,255,224,0.6)">最近 3 个月</span>内的新闻</div>
      </div>`;
    return;
  }
  if (diffDays < 0) {
    document.getElementById('results').innerHTML = `
      <div class="placeholder">
        <div class="placeholder-icon">⚠️</div>
        <div class="placeholder-title">日期无效</div>
        <div class="placeholder-sub">请选择今天或过去的日期</div>
      </div>`;
    return;
  }

  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.textContent = '...';
  setStatus('loading', `正在扫描 ${dateVal} 的全球新闻数据...`);
  document.getElementById('results').innerHTML = '';
  allArticles = [];

  const query = buildQuery(keywords);

  // Use STARTDATETIME/ENDDATETIME for specific date
  const pad = n => String(n).padStart(2, '0');
  const d = new Date(dateVal);
  const start = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}000000`;
  const end   = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}235959`;

  // Use RSS format — more reliably parsed than JSON for cross-origin
  const gdeltUrl = `https://api.gdeltproject.org/api/v2/doc/doc?query=${encodeURIComponent(query)}&mode=artlist&maxrecords=250&startdatetime=${start}&enddatetime=${end}&format=rss&sort=DateDesc`;

  try {
    setStatus('loading', '正在通过代理连接 GDELT 数据库...');
    const raw = await fetchViaProxy(gdeltUrl);

    // Check if response looks like an error page
    if (raw.trim().startsWith('Queries') || raw.trim().startsWith('<html') && raw.includes('error')) {
      throw new Error('GDELT 返回错误，请稍后重试');
    }

    let articles = [];

    // Try RSS parse first
    if (raw.includes('<rss') || raw.includes('<channel')) {
      articles = parseRSS(raw);
    }
    // Fallback: try JSON
    else if (raw.trim().startsWith('{')) {
      const json = JSON.parse(raw);
      articles = (json.articles || []).map(a => ({
        title: a.title || '(无标题)',
        url: a.url || '#',
        domain: (() => { try { return new URL(a.url).hostname.replace('www.',''); } catch { return ''; } })(),
        date: a.seendate ? a.seendate.substring(0,4)+'-'+a.seendate.substring(4,6)+'-'+a.seendate.substring(6,8) : '',
        description: ''
      }));
    } else {
      throw new Error('无法解析返回数据，GDELT 可能暂时不可用');
    }

    if (articles.length === 0) {
      hideStatus();
      document.getElementById('results').innerHTML = `
        <div class="placeholder">
          <div class="placeholder-icon">🔍</div>
          <div class="placeholder-title">NO RESULTS</div>
          <div class="placeholder-sub">
            ${dateVal} 未找到相关新闻<br>
            可尝试扩大关键词范围或选择其他日期
          </div>
        </div>`;
      return;
    }

    allArticles = articles;
    hideStatus();
    renderPage(1);

  } catch (err) {
    setStatus('error', '请求失败：' + err.message);
    document.getElementById('results').innerHTML = `
      <div class="placeholder">
        <div class="placeholder-icon">📡</div>
        <div class="placeholder-title">连接失败</div>
        <div class="placeholder-sub" style="color:#ff5050">${err.message}<br><br><span style="color:#4a6070">请检查网络连接后重试</span></div>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'SCAN';
  }
}

document.getElementById('dateInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
