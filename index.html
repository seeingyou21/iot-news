<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT 新闻雷达</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --white: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --border2: #cbd5e1;
  --accent: #0ea5e9;
  --accent-dark: #0284c7;
  --accent-light: #e0f2fe;
  --green: #10b981;
  --green-light: #d1fae5;
  --orange: #f59e0b;
  --orange-light: #fef3c7;
  --red: #ef4444;
  --red-light: #fee2e2;
  --purple: #8b5cf6;
  --purple-light: #ede9fe;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  line-height: 1.6;
}

/* subtle dot grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: 0.45;
  pointer-events: none;
  z-index: 0;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 48px 20px 80px;
  position: relative;
  z-index: 1;
}

/* ── HERO ── */
.hero {
  margin-bottom: 36px;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--accent-light);
  color: var(--accent-dark);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  margin-bottom: 16px;
  border: 1px solid rgba(14,165,233,0.25);
}

.pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(32px, 6vw, 54px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--text);
  margin-bottom: 12px;
}

h1 em {
  font-style: normal;
  color: var(--accent);
}

.hero-sub {
  font-size: 15px;
  color: var(--text2);
  max-width: 520px;
  line-height: 1.7;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 28px;
  margin-bottom: 16px;
}

.card-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title::before {
  content: '';
  width: 14px; height: 2px;
  background: var(--accent);
  border-radius: 2px;
}

/* ── API KEY ── */
.apikey-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.apikey-input-wrap {
  position: relative;
  flex: 1;
}

.apikey-input-wrap input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 11px 44px 11px 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.apikey-input-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
  background: white;
}

.eye-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 15px;
  color: var(--text3);
  padding: 2px;
  transition: color 0.2s;
}
.eye-btn:hover { color: var(--text2); }

.key-status {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 8px;
  white-space: nowrap;
  border: 1px solid;
}

.key-status.empty { background: var(--bg); border-color: var(--border); color: var(--text3); }
.key-status.valid { background: var(--green-light); border-color: rgba(16,185,129,0.3); color: var(--green); }
.key-status.invalid { background: var(--orange-light); border-color: rgba(245,158,11,0.3); color: var(--orange); }

.key-hint {
  font-size: 12px;
  color: var(--text3);
  margin-top: 8px;
  line-height: 1.5;
}

.key-hint a { color: var(--accent); text-decoration: none; }
.key-hint a:hover { text-decoration: underline; }

/* ── DATE / PERIOD ── */
.mode-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 18px;
  width: fit-content;
}

.mode-tab {
  padding: 7px 18px;
  border-radius: 9px;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.18s;
}

.mode-tab.active {
  background: white;
  color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.date-fields {
  display: grid;
  gap: 12px;
}

.date-fields.single { grid-template-columns: 1fr; }
.date-fields.range { grid-template-columns: 1fr 1fr; }

@media (max-width: 500px) {
  .date-fields.range { grid-template-columns: 1fr; }
}

.field-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

input[type="date"] {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 11px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  color-scheme: light;
}

input[type="date"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
  background: white;
}

/* quick period buttons */
.quick-periods {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.qp-btn {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.qp-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

/* ── TOPICS ── */
.topics-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.topic-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.topic-chip input { display: none; }

.topic-chip .chip-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border2);
  transition: background 0.15s;
  flex-shrink: 0;
}

.topic-chip.on {
  background: var(--accent-light);
  border-color: rgba(14,165,233,0.4);
  color: var(--accent-dark);
}
.topic-chip.on .chip-dot { background: var(--accent); }

.topic-chip.t2.on { background: var(--purple-light); border-color: rgba(139,92,246,0.4); color: var(--purple); }
.topic-chip.t2.on .chip-dot { background: var(--purple); }
.topic-chip.t3.on { background: var(--green-light); border-color: rgba(16,185,129,0.4); color: var(--green); }
.topic-chip.t3.on .chip-dot { background: var(--green); }
.topic-chip.t4.on { background: var(--orange-light); border-color: rgba(245,158,11,0.4); color: var(--orange); }
.topic-chip.t4.on .chip-dot { background: var(--orange); }

/* ── LANGUAGE ── */
.lang-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.lang-btn {
  padding: 7px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.lang-btn.active {
  background: var(--accent-light);
  border-color: rgba(14,165,233,0.4);
  color: var(--accent-dark);
}

/* ── SEARCH BUTTON ── */
.search-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 15px 28px;
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 4px;
  position: relative;
  overflow: hidden;
}

.search-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
}

.search-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(14,165,233,0.35);
}

.search-btn:active { transform: translateY(0); }
.search-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* scan line animation on button */
.scan-bar {
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: scanBtn 1.8s ease-in-out infinite;
  display: none;
}

.search-btn.loading .scan-bar { display: block; }

@keyframes scanBtn {
  0% { left: -60%; }
  100% { left: 110%; }
}

/* ── STATUS ── */
.status-msg {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 16px;
}

.status-msg.loading {
  display: flex;
  background: var(--accent-light);
  border: 1px solid rgba(14,165,233,0.2);
  color: var(--accent-dark);
}

.status-msg.error {
  display: flex;
  background: var(--red-light);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--red);
}

.spinner {
  width: 16px; height: 16px;
  border: 2.5px solid rgba(14,165,233,0.25);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── SUMMARY CARD ── */
.summary-banner {
  background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  border: 1px solid rgba(14,165,233,0.2);
  border-radius: 18px;
  padding: 22px 24px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.summary-banner::after {
  content: '✦';
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 48px;
  color: rgba(14,165,233,0.08);
  pointer-events: none;
}

.summary-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.summary-text {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text2);
}

/* ── NEWS RESULTS HEADER ── */
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}

.results-label {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.results-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  background: var(--green-light);
  color: var(--green);
  border: 1px solid rgba(16,185,129,0.25);
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

/* ── NEWS CARD ── */
.news-list { display: flex; flex-direction: column; gap: 12px; }

.news-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  transition: all 0.2s;
  animation: slideUp 0.4s ease both;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}

.news-card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(14,165,233,0.12);
  transform: translateY(-2px);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.news-card:nth-child(1) { animation-delay: 0.04s; }
.news-card:nth-child(2) { animation-delay: 0.08s; }
.news-card:nth-child(3) { animation-delay: 0.12s; }
.news-card:nth-child(4) { animation-delay: 0.16s; }
.news-card:nth-child(5) { animation-delay: 0.20s; }
.news-card:nth-child(n+6) { animation-delay: 0.24s; }

.news-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.news-tags { display: flex; gap: 6px; flex-wrap: wrap; }

.news-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 6px;
  border: 1px solid;
}

.news-tag.iot { background: var(--accent-light); color: var(--accent-dark); border-color: rgba(14,165,233,0.25); }
.news-tag.smart { background: var(--purple-light); color: var(--purple); border-color: rgba(139,92,246,0.25); }
.news-tag.aiot { background: var(--green-light); color: var(--green); border-color: rgba(16,185,129,0.25); }
.news-tag.other { background: var(--bg); color: var(--text3); border-color: var(--border); }

.importance-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}

.imp-high { background: var(--red-light); color: var(--red); }
.imp-medium { background: var(--orange-light); color: var(--orange); }
.imp-low { background: var(--bg); color: var(--text3); }

.news-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 8px;
}

.news-summary {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
}

.news-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 6px;
}

.news-source {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

.news-link {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 500;
  transition: opacity 0.15s;
}

.news-link:hover { opacity: 0.7; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 64px 20px;
  color: var(--text3);
}

.empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.6; }
.empty-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 8px;
}
.empty-desc { font-size: 14px; line-height: 1.7; }

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0 20px;
}
</style>
</head>
<body>
<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">
      <span class="pulse-dot"></span>
      实时行业情报
    </div>
    <h1>IoT & 智能家居<br><em>新闻雷达</em></h1>
    <p class="hero-sub">输入日期或时间段，一键检索全球 IoT 与智能家居行业动态，由 Claude AI 实时搜索整理。</p>
  </div>

  <!-- API KEY -->
  <div class="card">
    <div class="card-title">API 密钥配置</div>
    <div class="apikey-row">
      <div class="apikey-input-wrap">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." oninput="onKeyInput()" />
        <button class="eye-btn" id="eyeBtn" onclick="toggleEye()">👁</button>
      </div>
      <div class="key-status empty" id="keyStatus">未填写</div>
    </div>
    <div class="key-hint">
      前往 <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> 获取 Key · 仅保存在本地浏览器，不上传
    </div>
  </div>

  <!-- DATE / PERIOD -->
  <div class="card">
    <div class="card-title">时间范围</div>

    <div class="mode-tabs">
      <button class="mode-tab active" id="tabSingle" onclick="setMode('single')">指定日期</button>
      <button class="mode-tab" id="tabRange" onclick="setMode('range')">时间段</button>
    </div>

    <div id="singleMode">
      <div class="date-fields single">
        <div>
          <div class="field-label">日期</div>
          <input type="date" id="singleDate" />
        </div>
      </div>
    </div>

    <div id="rangeMode" style="display:none">
      <div class="date-fields range">
        <div>
          <div class="field-label">开始日期</div>
          <input type="date" id="startDate" />
        </div>
        <div>
          <div class="field-label">结束日期</div>
          <input type="date" id="endDate" />
        </div>
      </div>
      <div class="quick-periods">
        <span style="font-size:12px;color:var(--text3);align-self:center;margin-right:2px;">快捷：</span>
        <button class="qp-btn" onclick="setQuickPeriod(7)">近 7 天</button>
        <button class="qp-btn" onclick="setQuickPeriod(14)">近 14 天</button>
        <button class="qp-btn" onclick="setQuickPeriod(30)">近 30 天</button>
        <button class="qp-btn" onclick="setQuickPeriod(90)">近 3 个月</button>
      </div>
    </div>
  </div>

  <!-- TOPICS -->
  <div class="card">
    <div class="card-title">关注领域</div>
    <div class="topics-grid">
      <label class="topic-chip t1 on"><input type="checkbox" value="IoT" checked><span class="chip-dot"></span>IoT 物联网</label>
      <label class="topic-chip t2 on"><input type="checkbox" value="智能家居" checked><span class="chip-dot"></span>智能家居</label>
      <label class="topic-chip t1 on"><input type="checkbox" value="Smart Home" checked><span class="chip-dot"></span>Smart Home</label>
      <label class="topic-chip t3"><input type="checkbox" value="AIoT"><span class="chip-dot"></span>AIoT</label>
      <label class="topic-chip t3"><input type="checkbox" value="智能设备"><span class="chip-dot"></span>智能设备</label>
      <label class="topic-chip t4"><input type="checkbox" value="边缘计算"><span class="chip-dot"></span>边缘计算</label>
      <label class="topic-chip t4"><input type="checkbox" value="Matter协议"><span class="chip-dot"></span>Matter 协议</label>
      <label class="topic-chip t2"><input type="checkbox" value="工业物联网"><span class="chip-dot"></span>工业物联网</label>
    </div>
  </div>

  <!-- LANGUAGE -->
  <div class="card">
    <div class="card-title">语言偏好</div>
    <div class="lang-row">
      <button class="lang-btn active" id="lang-zh" onclick="setLang('zh')">🇨🇳 中文优先</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇺🇸 英文优先</button>
      <button class="lang-btn" id="lang-both" onclick="setLang('both')">🌏 中英双语</button>
    </div>
  </div>

  <!-- SEARCH -->
  <button class="search-btn" id="searchBtn" onclick="doSearch()">
    <div class="scan-bar"></div>
    <span id="searchBtnTxt">🔍 开始检索</span>
  </button>

  <div style="height:24px;"></div>

  <!-- STATUS -->
  <div class="status-msg" id="statusMsg">
    <div class="spinner"></div>
    <span id="statusTxt"></span>
  </div>

  <!-- RESULTS -->
  <div id="resultsArea">
    <div class="empty">
      <div class="empty-icon">📡</div>
      <div class="empty-title">等待检索</div>
      <div class="empty-desc">配置好参数后点击「开始检索」<br>Claude AI 将自动搜索并整理行业资讯</div>
    </div>
  </div>

</div>

<script>
// ── State ──
let currentLang = 'zh';
let currentMode = 'single';

// ── Init ──
const today = new Date().toISOString().split('T')[0];
document.getElementById('singleDate').value = today;
document.getElementById('startDate').value = (() => {
  const d = new Date(); d.setDate(d.getDate() - 7);
  return d.toISOString().split('T')[0];
})();
document.getElementById('endDate').value = today;

// Load saved key
const savedKey = localStorage.getItem('claude_iot_key');
if (savedKey) {
  document.getElementById('apiKey').value = savedKey;
  updateKeyStatus(savedKey);
}

// ── Topic chips ──
document.querySelectorAll('.topic-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chip.classList.toggle('on');
    chip.querySelector('input').checked = chip.classList.contains('on');
  });
});

// ── API Key ──
function onKeyInput() {
  const val = document.getElementById('apiKey').value.trim();
  if (val) localStorage.setItem('claude_iot_key', val);
  updateKeyStatus(val);
}

function updateKeyStatus(val) {
  const el = document.getElementById('keyStatus');
  if (!val) {
    el.className = 'key-status empty'; el.textContent = '未填写';
  } else if (val.startsWith('sk-ant-')) {
    el.className = 'key-status valid'; el.textContent = '✓ 有效';
  } else {
    el.className = 'key-status invalid'; el.textContent = '⚠ 格式有误';
  }
}

function toggleEye() {
  const inp = document.getElementById('apiKey');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

// ── Mode ──
function setMode(m) {
  currentMode = m;
  document.getElementById('singleMode').style.display = m === 'single' ? '' : 'none';
  document.getElementById('rangeMode').style.display = m === 'range' ? '' : 'none';
  document.getElementById('tabSingle').classList.toggle('active', m === 'single');
  document.getElementById('tabRange').classList.toggle('active', m === 'range');
}

function setQuickPeriod(days) {
  const end = new Date();
  const start = new Date(); start.setDate(start.getDate() - days);
  document.getElementById('startDate').value = start.toISOString().split('T')[0];
  document.getElementById('endDate').value = end.toISOString().split('T')[0];
}

// ── Language ──
function setLang(l) {
  currentLang = l;
  ['zh','en','both'].forEach(x => {
    document.getElementById('lang-'+x).classList.toggle('active', x === l);
  });
}

// ── Status ──
function showStatus(type, txt) {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg ' + type;
  document.getElementById('statusTxt').textContent = txt;
}
function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

// ── Main search ──
async function doSearch() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey || !apiKey.startsWith('sk-ant-')) {
    alert('请先填写有效的 Anthropic API Key（以 sk-ant- 开头）');
    return;
  }

  const topics = [...document.querySelectorAll('.topic-chip.on input')].map(i => i.value);
  if (topics.length === 0) { alert('请至少选择一个关注领域'); return; }

  // Build date range description
  let dateDesc = '';
  if (currentMode === 'single') {
    const d = document.getElementById('singleDate').value;
    if (!d) { alert('请选择日期'); return; }
    dateDesc = d;
  } else {
    const s = document.getElementById('startDate').value;
    const e = document.getElementById('endDate').value;
    if (!s || !e) { alert('请选择开始和结束日期'); return; }
    if (s > e) { alert('开始日期不能晚于结束日期'); return; }
    dateDesc = `${s} 至 ${e}`;
  }

  const langNote = currentLang === 'zh'
    ? '请优先返回中文新闻，重要英文资讯也可包含。'
    : currentLang === 'en'
    ? '请优先返回英文国际新闻资讯。'
    : '请同时覆盖中文和英文重要资讯。';

  const topicsStr = topics.join('、');

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('searchBtnTxt').textContent = '检索中...';
  showStatus('loading', `正在检索 ${dateDesc} 的行业情报...`);
  document.getElementById('resultsArea').innerHTML = '';

  const prompt = `你是专业的IoT与智能家居行业分析师。请使用网络搜索，查找 ${dateDesc} 期间发布的关于以下主题的行业新闻：${topicsStr}。

${langNote}

请搜索并整理 8-12 条真实、有价值的行业新闻，严格按以下JSON格式返回（只返回JSON，不要任何其他文字、解释或markdown代码块）：

{"summary":"对该时期行业动态的整体概述，2-3句话，指出主要趋势","news":[{"title":"新闻标题","source":"媒体来源名称","date":"发布日期YYYY-MM-DD","tags":["标签1","标签2"],"summary":"新闻摘要2-3句，说明核心内容和意义","url":"原文链接或空字符串","importance":"high"}]}

importance只能是：high（重大行业动态/融资/政策/突破）、medium（一般产品发布/市场数据）、low（参考信息）
tags从以下选择：IoT、智能家居、AIoT、智能设备、边缘计算、Matter、工业物联网、融资、新产品、政策法规、技术突破、市场数据
按importance降序排列，确保信息真实来自可靠来源。`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();

    // Extract all text blocks
    let rawText = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');

    // Find JSON
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('返回格式异常，无法解析新闻数据');
    const parsed = JSON.parse(jsonMatch[0]);

    hideStatus();
    renderResults(parsed, dateDesc);

  } catch (e) {
    showStatus('error', '检索失败：' + e.message);
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">检索出错</div>
        <div class="empty-desc">${e.message}<br><br>请检查 API Key 是否有效，或稍后重试</div>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    document.getElementById('searchBtnTxt').textContent = '🔍 开始检索';
  }
}

// ── Render ──
function tagClass(t) {
  if (['IoT','边缘计算','Matter','工业物联网'].includes(t)) return 'iot';
  if (['智能家居','Smart Home','AIoT','智能设备'].includes(t)) return 'smart';
  if (['技术突破','融资','新产品'].includes(t)) return 'aiot';
  return 'other';
}

function impClass(imp) {
  if (imp === 'high') return 'imp-high';
  if (imp === 'medium') return 'imp-medium';
  return 'imp-low';
}

function impLabel(imp) {
  if (imp === 'high') return '🔴 重要';
  if (imp === 'medium') return '🟡 一般';
  return '⚪ 参考';
}

function renderResults(data, dateDesc) {
  const news = data.news || [];
  let html = '';

  // Summary
  if (data.summary) {
    html += `
      <div class="summary-banner">
        <div class="summary-label">📊 ${dateDesc} · 行情概览</div>
        <div class="summary-text">${data.summary}</div>
      </div>`;
  }

  if (news.length === 0) {
    html += `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">未找到相关新闻</div>
        <div class="empty-desc">该时间段内暂无相关资讯<br>可尝试扩大时间范围或调整关键词</div>
      </div>`;
    document.getElementById('resultsArea').innerHTML = html;
    return;
  }

  html += `
    <div class="results-header">
      <div class="results-label">检索结果</div>
      <div class="results-count">共 ${news.length} 条资讯</div>
    </div>
    <div class="news-list">`;

  for (const item of news) {
    const tags = (item.tags || []).slice(0, 3);
    const tagsHtml = tags.map(t => `<span class="news-tag ${tagClass(t)}">${t}</span>`).join('');
    const hasUrl = item.url && item.url.startsWith('http');
    const cardAttr = hasUrl ? `href="${item.url}" target="_blank" rel="noopener"` : '';
    const Tag = hasUrl ? 'a' : 'div';

    html += `
      <${Tag} class="news-card" ${cardAttr}>
        <div class="news-card-top">
          <div class="news-tags">${tagsHtml}</div>
          <span class="importance-badge ${impClass(item.importance)}">${impLabel(item.importance)}</span>
        </div>
        <div class="news-title">${item.title || ''}</div>
        <div class="news-summary">${item.summary || ''}</div>
        <div class="news-footer">
          <span class="news-source">${item.source || ''}${item.date ? ' · ' + item.date : ''}</span>
          ${hasUrl ? `<a class="news-link" href="${item.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">阅读原文 →</a>` : ''}
        </div>
      </${Tag}>`;
  }

  html += '</div>';
  document.getElementById('resultsArea').innerHTML = html;
  window.scrollTo({ top: document.getElementById('resultsArea').offsetTop - 20, behavior: 'smooth' });
}
</script>
</body>
</html>
